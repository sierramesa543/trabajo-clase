<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Montoc Store</title>
    <link rel="stylesheet" href="static/css/style.css">
</head>
<body>

<header>
    <h1>MONTOC</h1>
    <div class="carrito">
        🛒 <span id="contador">0</span>
    </div>
</header>

<section class="productos">

    <div class="card">
        <img src="static/img/muñequitos.jpg">
        <h3>Camiseta Montoc</h3>
        <p>$50.000</p>
        <button onclick="agregarCarrito('Camiseta Montoc', 50000)">Agregar</button>
    </div>

    <div class="card">
        <img src="static/img/muñequitos.jpg">
        <h3>Hoodie Montoc</h3>
        <p>$90.000</p>
        <button onclick="agregarCarrito('Hoodie Montoc', 90000)">Agregar</button>
    </div>

</section>

<section class="carrito-detalle">
    <h2>Carrito</h2>
    <ul id="lista-carrito"></ul>
    <h3>Total: $<span id="total">0</span></h3>
    <button class="comprar-btn" onclick="comprar()">Finalizar compra</button>
</section>

<script>
let carrito = [];
let total = 0;

function agregarCarrito(nombre, precio) {
    carrito.push({nombre, precio});
    total += precio;

    document.getElementById("contador").innerText = carrito.length;
    document.getElementById("total").innerText = total;

    let lista = document.getElementById("lista-carrito");
    let item = document.createElement("li");
    item.innerText = nombre + " - $" + precio;
    lista.appendChild(item);
}

function comprar() {
    if(carrito.length === 0){
        alert("Tu carrito está vacío");
        return;
    }

    alert("Compra realizada con éxito 🛍️");
    carrito = [];
    total = 0;

    document.getElementById("contador").innerText = 0;
    document.getElementById("total").innerText = 0;
    document.getElementById("lista-carrito").innerHTML = "";
}
</script>

</body>
</html>
